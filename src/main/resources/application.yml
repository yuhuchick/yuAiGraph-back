app:
  base-url: ${APP_BASE_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:knowledge-graph-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration: 86400000   # 24 小时（毫秒）

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/knowledge_graph?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:yuhuang11}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      initialization-fail-timeout: -1
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${PORT:8080}
  tomcat:
    connection-timeout: 20s
    threads:
      max: 50
      min-spare: 5

ai:
  api:
    base-url: https://api.scnet.cn/api/llm/v1
    key: ${AI_API_KEY:sk-MzIxLTIxMjM3ODM2MTUwLTE3NzUwMzc4NTgzNDQ=}
    chat-model: ${AI_CHAT_MODEL:MiniMax-M2.5}
    embedding-model: Qwen3-Embedding-8B
    # 单次送入 AI 的最大字符数（超长文档会分块处理）
    chunk-size: 4000
    # 调用上游 LLM 的 HTTP 超时（流式问答易触发读/整体响应超时，可按环境调大）
    http:
      connect-timeout-ms: 10000
      # 相邻两次从上游读到数据的最大间隔（SSE 两包之间无数据超过此时长会断）
      read-idle-seconds: 600
      write-timeout-seconds: 120
      # 从发起到响应流结束的整体上限（含长回答整段生成时间）
      response-timeout-seconds: 1800

logging:
  level:
    com.knowledge: INFO
    org.springframework.security: WARN
    com.zaxxer.hikari: INFO
    org.hibernate.SQL: DEBUG
